<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DeepSeek - Apple Inspired</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f5f5f7;
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
        }

        #root {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            min-height: 100vh;
        }

        .card {
            width: 380px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            border-radius: 24px;
            padding: 40px 32px;
            box-shadow:
                0 4px 6px rgba(0, 0, 0, 0.02),
                0 12px 24px rgba(0, 0, 0, 0.04),
                0 24px 48px rgba(0, 0, 0, 0.06);
            border: 0.5px solid rgba(255, 255, 255, 0.6);
            text-align: center;
            transition: transform 0.3s cubic-bezier(0.25, 0.1, 0.25, 1), box-shadow 0.3s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow:
                0 8px 12px rgba(0, 0, 0, 0.03),
                0 24px 48px rgba(0, 0, 0, 0.06),
                0 48px 96px rgba(0, 0, 0, 0.1);
        }

        .apple-logo-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            width: 72px;
            height: 72px;
            animation: spin 4s linear infinite;
        }

        .apple-logo-wrapper svg {
            width: 72px;
            height: 72px;
            filter: drop-shadow(0 4px 12px rgba(0, 0, 0, 0.15));
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        h1 {
            font-size: 24px;
            font-weight: 700;
            color: #1d1d1f;
            letter-spacing: -0.025em;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 15px;
            color: #86868b;
            line-height: 1.5;
            margin-bottom: 28px;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .button-primary {
            font-size: 15px;
            font-weight: 500;
            color: white;
            background: #4F46E5;
            padding: 12px 28px;
            border-radius: 980px;
            border: none;
            cursor: pointer;
            transition: background 0.2s ease;
            font-family: inherit;
        }

        .button-primary:hover {
            background: #4338CA;
        }

        .button-secondary {
            font-size: 15px;
            font-weight: 500;
            color: #4F46E5;
            background: transparent;
            padding: 12px 28px;
            border-radius: 980px;
            border: none;
            cursor: pointer;
            transition: opacity 0.2s ease;
            font-family: inherit;
        }

        .button-secondary:hover {
            opacity: 0.7;
        }

        .counter {
            margin-top: 20px;
            font-size: 13px;
            color: #aeaeb2;
            user-select: none;
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState } = React;

        function AppleLogo() {
            return (
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M17.05 12.75c0 3.47 2.55 5.25 5.05 5.25-.2.65-.6 1.5-1.1 2.15-.65.85-1.3 1.7-2.35 1.7-1.05 0-1.35-.65-2.55-.65s-1.55.65-2.55.65c-1.05 0-1.8-.95-2.5-1.85-.95-1.35-1.7-3.4-1.7-5.4 0-3.1 2-4.75 4-4.75 1.05 0 1.95.7 2.55.7.6 0 1.55-.75 2.65-.75.5 0 2.3.05 3.2 1.7-.1.05-1.7 1-1.7 3.4zM14.05 8.15c.55-.7 1-1.7.85-2.7-.85.05-1.85.55-2.45 1.25-.55.65-1.05 1.65-.9 2.65.95.05 1.9-.5 2.5-1.2z" fill="currentColor"/>
                </svg>
            );
        }

        function App() {
            const [count, setCount] = useState(0);

            return (
                <div className="card">
                    <div className="apple-logo-wrapper">
                        <AppleLogo />
                    </div>
                    <h1>Hello World</h1>
                    <p className="subtitle">Apple design meets DeepSeek. Built with React.</p>
                    <div className="button-group">
                        <button className="button-primary" onClick={() => setCount(c => c + 1)}>
                            Click Me
                        </button>
                        <button className="button-secondary" onClick={() => setCount(0)}>
                            Reset
                        </button>
                    </div>
                    {count > 0 && (
                        <p className="counter">Clicked {count} time{count !== 1 ? 's' : ''}</p>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
