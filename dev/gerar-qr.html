<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#08080f">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ranking Pro — Gerar QR</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/proofly-glass.css">
  <link rel="stylesheet" href="../css/nucleus.css">
  <script src="../js/site-paths.js"></script>
</head>
<body class="cliente-page nucleus-page">
  <div class="nucleus-shell">
    <div id="rp-site-nav"></div>

    <div class="glass-discovery-shell nucleus-glass nucleus-glass--compact" id="state-loading">
      <p class="nucleus-state">Carregando profissionais…</p>
    </div>

    <div class="glass-discovery-shell nucleus-glass nucleus-glass--compact nucleus-hidden" id="state-form">
      <p class="nucleus-eyebrow">Dev · sessão QR</p>
      <h1 class="nucleus-title">Gerar QR</h1>
      <p class="nucleus-subtitle">Válido por 2 horas · token único</p>

      <label class="nucleus-form-label" for="prof-select">Profissional</label>
      <select id="prof-select" class="nucleus-select"></select>

      <button type="button" class="home-splash-btn home-splash-btn--primary" id="btn-generate">Gerar QR Code</button>
      <p class="nucleus-meta" id="form-error" style="color:#fca5a5;margin-top:10px;"></p>
    </div>

    <div class="glass-discovery-shell nucleus-glass nucleus-hidden" id="state-result">
      <p class="nucleus-prof-name" id="result-name"></p>
      <div class="nucleus-qr-box" id="qr-canvas"></div>
      <p class="nucleus-meta" id="result-expires"></p>
      <div class="nucleus-url-row">
        <input type="text" class="nucleus-url-input" id="qr-url" readonly>
        <button type="button" class="home-splash-btn home-splash-btn--secondary nucleus-url-copy" id="btn-copy">Copiar</button>
      </div>
      <button type="button" class="home-splash-btn home-splash-btn--secondary" id="btn-new" style="margin-top:10px;">Gerar outro</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.3/build/qrcode.min.js"></script>
  <script src="../config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/site-nav.js"></script>
  <script src="../js/qr-service.js"></script>
  <script>
    (async function () {
      const loading = document.getElementById('state-loading');
      const formBlock = document.getElementById('state-form');
      const resultBlock = document.getElementById('state-result');
      const profSelect = document.getElementById('prof-select');
      const btnGenerate = document.getElementById('btn-generate');
      const btnCopy = document.getElementById('btn-copy');
      const btnNew = document.getElementById('btn-new');
      const formError = document.getElementById('form-error');
      const resultName = document.getElementById('result-name');
      const resultExpires = document.getElementById('result-expires');
      const qrCanvas = document.getElementById('qr-canvas');
      const qrUrlInput = document.getElementById('qr-url');

      function showForm() {
        loading.classList.add('nucleus-hidden');
        resultBlock.classList.add('nucleus-hidden');
        formBlock.classList.remove('nucleus-hidden');
      }

      function showResult(data, url) {
        formBlock.classList.add('nucleus-hidden');
        resultBlock.classList.remove('nucleus-hidden');
        resultName.textContent = data.professional_name;
        resultExpires.textContent = 'Expira: ' + new Date(data.expires_at).toLocaleString('pt-BR');
        qrUrlInput.value = url;
        qrCanvas.innerHTML = '';
        if (typeof QRCode !== 'undefined') {
          QRCode.toCanvas(url, { width: 200, margin: 2 }, function (err, canvas) {
            if (!err) qrCanvas.appendChild(canvas);
          });
        }
      }

      try {
        const professionals = await RankingProAPI.select(
          'professionals',
          '?select=id,name,specialty&order=name.asc&limit=50'
        );
        if (!professionals.length) {
          loading.innerHTML = '<p class="nucleus-state">Nenhum profissional no Proofly.</p>';
          return;
        }
        profSelect.innerHTML = professionals.map(function (p) {
          const spec = p.specialty ? ' — ' + p.specialty : '';
          return '<option value="' + p.id + '">' + p.name + spec + '</option>';
        }).join('');
        showForm();
      } catch (err) {
        loading.innerHTML = '<p class="nucleus-state">Erro ao carregar. Verifique config.js</p>';
      }

      btnGenerate.addEventListener('click', async function () {
        btnGenerate.disabled = true;
        formError.textContent = '';
        try {
          const result = await RankingProQR.createSession(profSelect.value, 2);
          if (result.status !== 'success') {
            formError.textContent = result.message || 'Erro ao criar sessão.';
            return;
          }
          showResult(result, result.url || RankingProQR.buildQrUrl(result.token));
        } catch (err) {
          formError.textContent = 'Erro ao gerar QR.';
        } finally {
          btnGenerate.disabled = false;
        }
      });

      btnCopy.addEventListener('click', async function () {
        try {
          await navigator.clipboard.writeText(qrUrlInput.value);
          btnCopy.textContent = 'Copiado!';
          setTimeout(function () { btnCopy.textContent = 'Copiar'; }, 2000);
        } catch {
          qrUrlInput.select();
        }
      });

      btnNew.addEventListener('click', function () {
        resultBlock.classList.add('nucleus-hidden');
        formBlock.classList.remove('nucleus-hidden');
      });
    })();
  </script>
</body>
</html>
