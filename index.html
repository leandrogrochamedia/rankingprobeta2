<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#08080f">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ranking Pro — Reputação verificada</title>



<script src="./site-paths.js"></script>
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/proofly.css">
</head>
<body class="home-splash nucleus-page">

  <div class="qr-modal" id="qrScannerContainer">
    <div class="qr-modal-backdrop" onclick="fecharScannerQR()"></div>
    <div class="qr-modal-content">
      <div class="qr-modal-header">
        <h3>📷 Escanear QR Code</h3>
        <button type="button" class="qr-modal-close" onclick="fecharScannerQR()">✕</button>
      </div>
      <div class="scanner-box"><div id="qr-reader"></div></div>
      <p id="qrScannerStatus" class="qr-status">Iniciando câmera...</p>
    </div>
  </div>

  <main class="home-splash-main">
    <div class="home-splash-card">
      <div class="home-splash-logo" aria-hidden="true">🏆</div>
      <div id="rp-site-nav"></div>

      <div class="home-splash-badge-wrap">
        <p class="home-splash-badge">✓ Só após atendimento real</p>
      </div>
      <h1>Ranking Pro</h1>
      <p class="home-splash-lead">Reputação verificada por QR — avaliações reais após atendimento.</p>

      <div class="home-splash-actions">
        <a class="home-splash-btn home-splash-btn--primary" href="login.html">
          <span aria-hidden="true">🔐</span>
          <span>Entrar</span>
        </a>
        <button type="button" class="home-splash-btn home-splash-btn--secondary" id="btnScanQr">
          <span aria-hidden="true">📷</span>
          <span>Escanear QR para avaliar</span>
        </button>
      </div>

      <p class="home-splash-divider">ou continue sem conta</p>
      <div class="home-splash-links">
        <a class="home-splash-link" href="discover.html">Buscar profissionais e lugares →</a>
      </div>
    </div>
  </main>

  <footer class="home-splash-footer">© 2026 Ranking Pro — Reputação verificada</footer>

  <script src="./index-qr.js"></script>
  <script src="./loader.js"></script>
  <script src="./site-nav.js"></script>
</body>
</html>
