<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#08080f">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ranking Pro — Login</title>

<style>
    .login-container { max-width: 420px; margin: 60px auto; padding: 0 20px; }
    .login-container .card { padding: 32px 28px; }
    .login-container h1 { text-align: center; font-size: 28px; margin-bottom: 4px; color: #0f172a; }
    .login-container .sub { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 14px; }
    .btn-google {
      width: 100%; padding: 14px; font-size: 18px; border-radius: 50px;
      background: #fff; color: #0f172a; border: 2px solid #e2e8f0;
      display: flex; align-items: center; justify-content: center; gap: 12px;
      cursor: pointer; transition: 0.2s; font-weight: 600;
    }
    .btn-google:hover { background: #f8fafc; border-color: #6366f1; transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
    .btn-google img { width: 24px; height: 24px; }
    .back-link { display: block; text-align: center; margin-top: 20px; color: #6366f1; font-weight: 600; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
    .info-box {
      background: #f1f5f9; border-radius: 12px; padding: 12px 16px; margin-top: 20px;
      font-size: 13px; color: #475569; text-align: center; border: 1px dashed #94a3b8;
    }
    .info-box strong { color: #0f172a; }
    .divider { text-align: center; margin: 16px 0; color: #94a3b8; font-size: 13px; }
    @media (max-width: 480px) { .login-container .card { padding: 24px 18px; } }
  </style>
  <link rel="stylesheet" href="./css/tokens.css">
  <link rel="stylesheet" href="./css/proofly.css">
</head>
<body>
  <div class="container login-container">
    <div class="card">
      <h1>🔐 Acessar</h1>
      <p class="sub">Entre para acessar sua conta</p>

      <button type="button" class="btn-google" id="btn-google">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google">
        Entrar com Google (Leandro Rocha)
      </button>

      <div class="divider">— ou —</div>

      <form id="login-form">
        <div style="margin-bottom:12px;">
          <input type="email" id="login-email" placeholder="email@exemplo.com" value="acesso@temporario.com" style="width:100%;padding:12px;border-radius:10px;border:2px solid #e2e8f0;font-size:15px;">
        </div>
        <div style="margin-bottom:16px;">
          <input type="password" id="login-password" placeholder="••••••••" value="123456" style="width:100%;padding:12px;border-radius:10px;border:2px solid #e2e8f0;font-size:15px;">
        </div>
        <button type="submit" class="btn" style="width:100%;padding:14px;font-size:18px;border-radius:50px;">🚀 Entrar</button>
      </form>

      <div class="divider">—</div>

      <a href="./register.html" class="back-link" style="margin-top:0;">✨ Criar nova conta</a>

      <a href="index.html" class="back-link">← Voltar para o início</a>

      <div class="info-box">
        💡 <strong>Qualquer credencial funciona.</strong><br>
        O sistema é demo — não valida email nem senha.
      </div>
    </div>
  </div>

  <script src="./loader.js"></script>
  <script>
    document.addEventListener('scriptsLoaded', function () {
      const urlParams = new URLSearchParams(window.location.search);
      const intent = urlParams.get('intent');

      if (intent === 'professional-onboarding' || intent === 'establishment-onboarding') {
        const session = getSession();
        if (session) {
          session.professionalId = null;
          session.establishmentId = null;
          setSession(session);
        }
      }

      const currentSession = getSession();
      if (currentSession && currentSession.userId) {
        if (typeof redirectAfterLogin === 'function') {
          redirectAfterLogin(intent);
          return;
        }
        window.location.href = './select-profile.html';
        return;
      }

      async function loginGoogleLeandro() {
        const btn = document.getElementById('btn-google');
        btn.disabled = true;
        btn.textContent = 'Entrando...';
        try {
          const email = 'leandrogrocha@gmail.com';
          let user = await fetchUserByEmail(email);
          if (!user) {
            const [profs, ests] = await Promise.all([
              fetchAPI("/rest/v1/professionals?name=ilike.*Leandro*&select=id&limit=1"),
              fetchAPI("/rest/v1/establishments?name=ilike.*Batel*&select=id&limit=1")
            ]);
            const profId = profs?.[0]?.id || null;
            // Handle establishmentId: try name, then ownership
            let estId = user.establishment_id; // start with DB value
            if (!estId) {
              // Try name lookup
              const estsByName = await fetchAPI("/rest/v1/establishments?name=ilike.*Batel*&select=id&limit=1");
              if (estsByName?.[0]?.id) {
                estId = estsByName[0].id;
              } else {
                // Fallback: ownership lookup
                const estsByOwner = await fetchAPI(`/rest/v1/establishments?owner_user_id=${user.id}&select=id&limit=1`);
                if (estsByOwner?.[0]?.id) {
                  estId = estsByOwner[0].id;
                }
              }
            }
            user = await createUser({
              name: 'Leandro Rocha', email,
              provider: 'google', role: 'estabelecimento',
              establishment_id: estId,
              professional_id: profId,
              client_id: null, is_admin: true
            });
            if (!user?.id) throw new Error('Falha ao criar usuário');
          }
          let profId = user.professional_id;
          let estId = user.establishment_id;
          if (!profId) {
            const profs = await fetchAPI("/rest/v1/professionals?name=ilike.*Leandro*&select=id&limit=1");
            profId = profs?.[0]?.id || null;
            if (profId) {
              await fetchAPI('/rest/v1/users?id=eq.' + user.id, 'PATCH', { professional_id: profId });
              user.professional_id = profId;
            }
          }
          // Handle establishmentId: try name, then ownership
          // use current value (already in variable)
          if (!estId) {
            // Try name lookup
            const estsByName = await fetchAPI("/rest/v1/establishments?name=ilike.*Batel*&select=id&limit=1");
            if (estsByName?.[0]?.id) {
              estId = estsByName[0].id;
            } else {
              // Fallback: ownership lookup
              const estsByOwner = await fetchAPI(`/rest/v1/establishments?owner_user_id=${user.id}&select=id&limit=1`);
              if (estsByOwner?.[0]?.id) {
                estId = estsByOwner[0].id;
              }
            }
          }
          if (estId) {
            await fetchAPI('/rest/v1/users?id=eq.' + user.id, 'PATCH', { establishment_id: estId });
            user.establishment_id = estId;
          }
          const session = {
            userId: user.id, name: user.name, email: user.email,
            role: user.role, clientId: user.client_id || null,
            professionalId: profId, establishmentId: estId,
            isAdmin: user.is_admin || false
          };
          delete session.activeProfile;
          setSession(session);
          console.log('✅ Login Leandro:', session);
          window.location.href = './select-profile.html';
        } catch (e) {
          console.error('Erro login Google:', e);
          alert('Erro ao iniciar sessão: ' + e.message);
          btn.disabled = false;
          btn.innerHTML = '<img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Entrar com Google (Leandro Rocha)';
        }
      }

      async function loginByEmail(email) {
        const user = await fetchUserByEmail(email);
        if (!user) return false;
        try { await syncUserSession(email); } catch (e) { console.warn(e); }
        window.location.href = './select-profile.html';
        return true;
      }

      function loginCliente() {
        window.location.href = './select-user.html';
      }

      window.loginCliente = loginCliente;
      window.loginGoogleLeandro = loginGoogleLeandro;
      window.loginByEmail = loginByEmail;
      document.getElementById('btn-google').addEventListener('click', loginGoogleLeandro);
      document.getElementById('login-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const email = document.getElementById('login-email').value.trim();
        if (email && await loginByEmail(email)) return;
        window.location.href = './select-user.html';
      });
    });
  </script>
</body>
</html>
