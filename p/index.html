<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="theme-color" content="#08080f">
  <meta name="color-scheme" content="dark">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Ranking Pro — Perfil</title>
  <link rel="stylesheet" href="../css/base.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/tinder-profile.css">
  <link rel="stylesheet" href="../css/proofly-glass.css">
  <link rel="stylesheet" href="../css/nucleus.css">
  <script src="../js/site-paths.js"></script>
</head>
<body class="cliente-page nucleus-page">
  <div class="nucleus-shell nucleus-shell--wide">
    <div id="rp-site-nav"></div>

    <div class="glass-discovery-shell nucleus-glass nucleus-glass--compact" id="state-loading">
      <p class="nucleus-state">Carregando perfil…</p>
    </div>

    <div class="glass-discovery-shell nucleus-glass nucleus-glass--compact nucleus-hidden" id="state-error">
      <p class="nucleus-error-title">Perfil não encontrado</p>
      <p class="nucleus-subtitle">Este profissional não existe ou o link está incorreto.</p>
      <a href="../index.html" class="home-splash-btn home-splash-btn--secondary" style="margin-top:12px;">Voltar ao início</a>
    </div>

    <div class="nucleus-hidden" id="state-profile">
      <div class="glass-discovery-shell nucleus-glass">
        <div class="nucleus-avatar" id="prof-avatar"></div>
        <h1 class="nucleus-prof-name" id="prof-name"></h1>
        <p class="nucleus-prof-specialty" id="prof-specialty"></p>
        <p class="nucleus-rating-big" id="rating-big">0.0</p>
        <p class="nucleus-rating-meta" id="rating-meta">0 avaliações</p>
      </div>

      <div class="glass-discovery-shell nucleus-glass nucleus-glass--compact">
        <p class="nucleus-eyebrow">Avaliações verificadas</p>
        <ul class="nucleus-reviews" id="reviews-list"></ul>
        <p class="nucleus-subtitle nucleus-hidden" id="reviews-empty">Ainda sem avaliações verificadas</p>
      </div>
    </div>
  </div>

  <script src="../config.js"></script>
  <script src="../js/api.js"></script>
  <script src="../js/site-nav.js"></script>
  <script src="../js/profile-service.js"></script>
  <script>
    (async function () {
      const loading = document.getElementById('state-loading');
      const errorBlock = document.getElementById('state-error');
      const profileBlock = document.getElementById('state-profile');
      const profAvatar = document.getElementById('prof-avatar');
      const profName = document.getElementById('prof-name');
      const profSpecialty = document.getElementById('prof-specialty');
      const ratingBig = document.getElementById('rating-big');
      const ratingMeta = document.getElementById('rating-meta');
      const reviewsList = document.getElementById('reviews-list');
      const reviewsEmpty = document.getElementById('reviews-empty');

      const profId = new URLSearchParams(window.location.search).get('id');

      function hideAll() {
        loading.classList.add('nucleus-hidden');
        errorBlock.classList.add('nucleus-hidden');
        profileBlock.classList.add('nucleus-hidden');
      }

      function initials(name) {
        return String(name || '?').split(/\s+/).slice(0, 2).map(function (w) {
          return w[0] || '';
        }).join('').toUpperCase();
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;');
      }

      function escapeAttr(str) {
        return escapeHtml(str).replace(/'/g, '&#39;');
      }

      if (!profId) {
        hideAll();
        errorBlock.classList.remove('nucleus-hidden');
        return;
      }

      try {
        const prof = await RankingProProfile.getProfessionalById(profId);
        if (!prof) {
          hideAll();
          errorBlock.classList.remove('nucleus-hidden');
          return;
        }

        const reviews = await RankingProProfile.getReviewsForProfessional(prof.id);
        const verifiedReviews = (reviews || []).filter(RankingProProfile.isReviewVerified);

        hideAll();
        profileBlock.classList.remove('nucleus-hidden');

        if (prof.avatar_url) {
          profAvatar.innerHTML = '<img src="' + escapeAttr(prof.avatar_url) + '" alt="">';
        } else {
          profAvatar.textContent = initials(prof.name);
        }

        profName.textContent = prof.name;
        profSpecialty.textContent = prof.specialty || '';
        profSpecialty.style.display = prof.specialty ? 'block' : 'none';

        const avg = Number(prof.avg_rating) || 0;
        ratingBig.textContent = avg.toFixed(1);
        ratingMeta.textContent = RankingProProfile.formatRatingDisplay(avg, prof.total_reviews);
        document.title = prof.name + ' — Ranking Pro';

        if (!verifiedReviews.length) {
          reviewsEmpty.classList.remove('nucleus-hidden');
          return;
        }

        reviewsEmpty.classList.add('nucleus-hidden');
        reviewsList.innerHTML = verifiedReviews.map(function (r) {
          const stars = RankingProProfile.renderStars(r.rating);
          const comment = r.comment
            ? '<p class="nucleus-review-comment">' + escapeHtml(r.comment) + '</p>'
            : '';
          const date = RankingProProfile.formatRelativeDate(r.created_at);

          return (
            '<li class="glass-review-card review-card-cliente">' +
              '<div class="nucleus-review-stars">' + stars +
                '<span class="nucleus-verified">Verificada</span>' +
              '</div>' +
              comment +
              '<p class="nucleus-review-date">' + escapeHtml(date) + '</p>' +
            '</li>'
          );
        }).join('');
      } catch (err) {
        console.error(err);
        hideAll();
        errorBlock.classList.remove('nucleus-hidden');
      }
    })();
  </script>
</body>
</html>
