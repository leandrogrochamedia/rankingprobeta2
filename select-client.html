<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#08080f" />
  <meta name="color-scheme" content="dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🏆 Ranking Pro — Quem é você?</title>
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/proofly.css" />
  <style>
    .select-container { max-width: 720px; margin: 30px auto; padding: 0 20px; }
    .select-container .card { padding: 28px 24px; }
    .select-container h1 { text-align: center; font-size: 28px; color: #0f172a; margin-bottom: 4px; }
    .select-container .sub { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 15px; }
    .client-grid { display: flex; flex-direction: column; gap: 10px; max-height: 520px; overflow-y: auto; padding-right: 6px; }
    .client-card {
      display: flex; align-items: center; gap: 16px; background: #f8fafc; border-radius: 14px;
      padding: 14px 18px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s;
    }
    .client-card:hover { border-color: #6366f1; background: #eef2ff; transform: translateX(4px); }
    .client-card .avatar-small {
      width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 20px; color: #fff;
    }
    .client-card .info { flex: 1; min-width: 0; }
    .client-card .info .name { font-weight: 700; color: #0f172a; font-size: 17px; }
    .client-card .info .meta { color: #64748b; font-size: 13px; margin-top: 2px; }
    .client-card .info .tags { font-size: 12px; color: #818cf8; margin-top: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .client-card .badge-select { background: #6366f1; color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; opacity: 0; transition: 0.2s; flex-shrink: 0; }
    .client-card:hover .badge-select { opacity: 1; }
    .empty-state { text-align: center; color: #94a3b8; padding: 40px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .select-actions { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; }
    .select-actions .btn { text-decoration: none; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: #6366f1; font-weight: 600; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>
  <div id="userMessage" class="user-message" style="display:none;"></div>

  <div class="container select-container">
    <div class="card">
      <h1>👤 Quem é você?</h1>
      <p class="sub">Selecione o cliente para simular o login e personalizar a busca</p>
      <div id="clientList" class="client-grid"><div class="loading">Carregando...</div></div>

      <div class="select-actions">
        <a href="./signup.html" class="btn btn-primary">📝 Cadastrar novo</a>
        <a href="./login.html?intent=cliente" class="btn btn-outline">← Voltar</a>
      </div>
    </div>
  </div>

  <script src="./loader.js"></script>

  <script>
    document.addEventListener('scriptsLoaded', initSelecionarClientePage);
  </script>
  <script>
    function initSelecionarClientePage() {
    const urlParams = new URLSearchParams(window.location.search);
    const force = urlParams.get('force') === 'true';
    const listEl = document.getElementById('clientList');

    const CLIENT_API = typeof CLIENT_PROFILES_API !== 'undefined'
      ? CLIENT_PROFILES_API
      : '/rest/v1/client_profiles';

    const session = getSession();
    if (!session?.userId) {
      window.location.href = './login.html?intent=cliente';
    }
    if (getActiveProfileType(session) !== 'client') {
      setActiveProfileType('client');
    }
    if (!force && (typeof getClientId === 'function' ? getClientId(session) : session?.clientId)) {
      window.location.href = './discover.html';
    }

    async function selecionarCliente(client) {
      let user = null;
      const baseUserId = session?.userId;

      if (baseUserId && typeof fetchUserById === 'function') {
        user = await fetchUserById(baseUserId);
      } else if (client.email) {
        user = await fetchUserByEmail(client.email);
        if (!user) {
          user = await createUser({
            name: client.name,
            email: client.email,
            provider: 'cadastro',
            role: 'cliente',
            client_id: client.id
          });
        }
      }

      if (user?.id && typeof linkUserClientProfile === 'function') {
        user = await linkUserClientProfile(user.id, client.id);
      } else if (user?.id) {
        await updateUser(user.id, { client_id: client.id });
        user.client_id = client.id;
      }

      if (typeof syncClientPrefsFromRecord === 'function') {
        syncClientPrefsFromRecord(client);
      }

      const payload = typeof buildSessionFromUser === 'function' && user
        ? buildSessionFromUser(user, {
            name: client.name,
            email: client.email || session?.email || '',
            activeProfile: 'client',
            role: 'cliente'
          })
        : {
            userId: user?.id || session?.userId,
            clientId: client.id,
            name: client.name,
            email: client.email || session?.email || '',
            role: 'cliente',
            activeProfile: 'client',
            professionalId: null,
            establishmentId: null,
            isAdmin: false
          };
      setSession(payload);

      window.location.href = './discover.html';
    }

    window.selecionarClienteById = async function(id) {
      try {
        const data = await fetchAPI(`${CLIENT_API}?id=eq.${id}&select=*`);
        if (data?.[0]) await selecionarCliente(data[0]);
      } catch (e) {
        if (typeof showAlert === 'function') showAlert('❌', e.message);
      }
    };

    async function carregarClientes() {
      listEl.innerHTML = '<div class="loading">Carregando...</div>';
      try {
        const data = await fetchAPI(
          `${CLIENT_API}?select=id,name,email,city,state,avatar_url,prof_style_tags,est_style_tags&order=name`
        );

        if (!data?.length) {
          listEl.innerHTML = `
            <div class="empty-state">
              <div class="icon">📭</div>
              <p>Nenhum cliente cadastrado ainda.</p>
              <p style="margin-top:8px;"><a href="./signup.html" style="color:#6366f1;font-weight:600;">Cadastrar o primeiro →</a></p>
            </div>`;
          return;
        }

        listEl.innerHTML = data.map(c => {
          const initial = (c.name || '?').charAt(0).toUpperCase();
          const avatar = c.avatar_url
            ? `<img src="${c.avatar_url}" class="avatar-small" alt="" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'avatar-small',textContent:'${initial}'}))">`
            : `<div class="avatar-small">${initial}</div>`;
          const loc = [c.city, c.state].filter(Boolean).join(' / ') || 'Local não informado';
          const tags = (c.prof_style_tags || []).slice(0, 3).join(', ');
          const safeName = (c.name || '').replace(/'/g, "\\'");
          return `<div class="client-card" onclick="selecionarClienteById('${c.id}')">
            ${avatar}
            <div class="info">
              <div class="name">${escapeHtml(c.name)}</div>
              <div class="meta">${escapeHtml(c.email || '—')} · ${escapeHtml(loc)}</div>
              ${tags ? `<div class="tags">🎯 ${escapeHtml(tags)}</div>` : ''}
            </div>
            <span class="badge-select">ENTRAR</span>
          </div>`;
        }).join('');
      } catch (e) {
        listEl.innerHTML = `<p style="color:#ef4444;text-align:center;">Erro: ${escapeHtml(e.message)}<br><small>Rode migrations/020_simplificar_client_model.sql no Supabase.</small></p>`;
        console.error(e);
      }
    }

    carregarClientes();
    }
  </script>
</body>
</html>
