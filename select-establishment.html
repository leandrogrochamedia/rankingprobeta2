<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#08080f" />
  <meta name="color-scheme" content="dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🏆 Ranking Pro — Selecionar Estabelecimento</title>
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/proofly.css" />
  <style>
    .select-container { max-width: 720px; margin: 30px auto; padding: 0 20px; }
    .select-container .card { padding: 28px 24px; }
    .select-container h1 { text-align: center; font-size: 28px; color: #0f172a; margin-bottom: 4px; }
    .select-container .sub { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 15px; }
    .est-grid { display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; padding-right: 6px; }
    .est-card { display: flex; align-items: center; gap: 16px; background: #f8fafc; border-radius: 14px; padding: 14px 18px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .est-card:hover { border-color: #6366f1; background: #eef2ff; transform: translateX(4px); }
    .est-card .avatar-small { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 20px; color: #fff; background: linear-gradient(135deg, #6366f1, #8b5cf6); flex-shrink: 0; }
    .est-card .info { flex: 1; }
    .est-card .info .name { font-weight: 700; color: #0f172a; font-size: 17px; }
    .est-card .info .city { color: #64748b; font-size: 14px; }
    .est-card .badge-select { background: #6366f1; color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; opacity: 0; transition: 0.2s; }
    .est-card:hover .badge-select { opacity: 1; }
    .est-card .badge-owner { background: #fef3c7; color: #92400e; border: 1px solid #fcd34d; padding: 3px 10px; border-radius: 999px; font-size: 10px; font-weight: 700; letter-spacing: 0.04em; text-transform: uppercase; margin-left: 6px; }
    .est-card.is-owned { border-color: rgba(245, 158, 11, 0.35); background: #fffbeb; }
    .empty-state { text-align: center; color: #94a3b8; padding: 40px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .back-link { display: block; text-align: center; margin-top: 20px; color: #6366f1; font-weight: 600; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
    @media (max-width: 480px) { .est-card { padding: 12px 14px; } .est-card .avatar-small { width: 40px; height: 40px; font-size: 16px; } }
  </style>
</head>
<body>

  <div id="userMessage" class="user-message" style="display:none;"></div>

  <div class="container select-container">
    <div class="card">
      <h1>🏢 Qual estabelecimento você representa?</h1>
      <p class="sub">Selecione o estabelecimento que você quer gerenciar</p>
      <div id="estList" class="est-grid"><div class="loading">Carregando estabelecimentos...</div></div>
      <a href="./estabelecimento.html" class="back-link">← Voltar para área do estabelecimento</a>
    </div>
  </div>

  <script src="./loader.js"></script>

  <script>
    document.addEventListener('scriptsLoaded', function () {
    // ============================================================
    // SELEÇÃO DE ESTABELECIMENTO — LISTA TODOS (MODO DEV)
    // ============================================================
    // ATENÇÃO: Atualmente, esta página lista TODOS os estabelecimentos
    // do sistema para facilitar testes. Futuramente, quando o fluxo
    // de multi-perfil estiver completo, deve-se filtrar apenas os
    // estabelecimentos vinculados ao usuário (via user_profiles).
    // Para filtrar, substitua a chamada fetchAPI abaixo pela busca
    // em user_profiles.
    // ============================================================

    const urlParams = new URLSearchParams(window.location.search);
    const force = urlParams.get('force') === 'true';
    console.log('🔍 Force mode:', force);

    const session = getSession();
    if (!session?.userId) {
      window.location.href = './login.html?intent=establishment';
    }
    if (getActiveProfileType(session) !== 'establishment') {
      setActiveProfileType('establishment');
    }
    if (!force && session.establishmentId) {
      window.location.href = './establishment-dashboard.html';
    }

    const listEl = document.getElementById('estList');

    function selecionarEstabelecimento(id, name) {
      const currentSession = getSession();
      const newSession = {
        ...currentSession,
        activeProfile: 'establishment',
        role: 'estabelecimento',
        establishmentId: id,
        name: name
      };
      setSession(newSession);
      localStorage.setItem('selected_establishment_id', id);
      if (!force) {
        updateUser(session.userId, { establishment_id: id });
      }
      window.location.href = './establishment-dashboard.html';
    }

    async function carregarEstabelecimentos() {
      listEl.innerHTML = '<div class="loading">Carregando...</div>';
      try {
        let data;
        try {
          data = await fetchAPI(
            `/rest/v1/establishments?select=id,name,city,avatar_url,owner_user_id&order=name`
          );
        } catch (e) {
          if (String(e.message || e).includes('owner_user_id')) {
            data = await fetchAPI(
              `/rest/v1/establishments?select=id,name,city,avatar_url&order=name`
            );
          } else {
            throw e;
          }
        }

        // === BLOCO COMENTADO: FILTRO POR USER_PROFILES ===
        // const userProfiles = await fetchAPI(`/rest/v1/user_profiles?user_id=eq.${session.userId}&type=eq.establishment&select=profile_id`);
        // const ids = userProfiles.map(up => up.profile_id);
        // if (!ids.length) {
        //   listEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Você não tem estabelecimentos vinculados. <a href="./establishment-onboarding.html">Cadastre um</a>.</p></div>`;
        //   return;
        // }
        // const idList = ids.join(',');
        // const data = await fetchAPI(`/rest/v1/establishments?id=in.(${idList})&select=id,name,city,avatar_url&order=name`);

        if (!data || data.length === 0) {
          listEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Nenhum estabelecimento cadastrado.</p></div>`;
          return;
        }
        let html = '';
        data.forEach(e => {
          const isOwner = e.owner_user_id && session.userId && e.owner_user_id === session.userId;
          const avatar = e.avatar_url ? `<img src="${e.avatar_url}" class="avatar-small" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` : '';
          const placeholder = e.avatar_url ? `<div class="avatar-small" style="display:none;">${e.name.charAt(0).toUpperCase()}</div>` : `<div class="avatar-small">${e.name.charAt(0).toUpperCase()}</div>`;
          const ownerPill = isOwner ? '<span class="badge-owner">Owner</span>' : '';
          html += `<div class="est-card${isOwner ? ' is-owned' : ''}" onclick="selecionarEstabelecimento('${e.id}', '${escapeHtml(e.name)}')">
            ${avatar || placeholder}
            <div class="info"><div class="name">${escapeHtml(e.name)}${ownerPill}</div><div class="city">📍 ${escapeHtml(e.city || 'Cidade não informada')}</div></div>
            <span class="badge-select">ENTRAR</span>
          </div>`;
        });
        listEl.innerHTML = html;
      } catch (e) {
        listEl.innerHTML = `<p style="color:red;">Erro: ${e.message}</p>`;
        console.error('Erro ao carregar estabelecimentos:', e);
      }
    }

    carregarEstabelecimentos();
    });
  </script>

</body>
</html>
