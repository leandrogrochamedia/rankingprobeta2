<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#08080f" />
  <meta name="color-scheme" content="dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🏆 Ranking Pro — Selecionar Profissional</title>
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/proofly.css" />
  <link rel="stylesheet"  />
  <style>
    .select-container { max-width: 720px; margin: 30px auto; padding: 0 20px; }
    .select-container .card { padding: 28px 24px; }
    .select-container h1 { text-align: center; font-size: 28px; color: #0f172a; margin-bottom: 4px; }
    .select-container .sub { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 15px; }
    .prof-grid { display: flex; flex-direction: column; gap: 10px; max-height: 500px; overflow-y: auto; padding-right: 6px; }
    .prof-card { display: flex; align-items: center; gap: 16px; background: #f8fafc; border-radius: 14px; padding: 14px 18px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s; }
    .prof-card:hover { border-color: #6366f1; background: #eef2ff; transform: translateX(4px); }
    .prof-card .avatar-small { width: 48px; height: 48px; border-radius: 50%; object-fit: cover; background: #e2e8f0; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 20px; color: #fff; background: linear-gradient(135deg, #6366f1, #8b5cf6); flex-shrink: 0; }
    .prof-card .info { flex: 1; }
    .prof-card .info .name { font-weight: 700; color: #0f172a; font-size: 17px; }
    .prof-card .info .specialty { color: #64748b; font-size: 14px; }
    .prof-card .info .estab { font-size: 13px; color: #818cf8; }
    .prof-card .badge-select { background: #6366f1; color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; opacity: 0; transition: 0.2s; }
    .prof-card:hover .badge-select { opacity: 1; }
    .empty-state { text-align: center; color: #94a3b8; padding: 40px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .back-link { display: block; text-align: center; margin-top: 20px; color: #6366f1; font-weight: 600; text-decoration: none; font-size: 14px; }
    .back-link:hover { text-decoration: underline; }
    @media (max-width: 480px) { .prof-card { padding: 12px 14px; } .prof-card .avatar-small { width: 40px; height: 40px; font-size: 16px; } }
  </style>
</head>
<body>

  <div id="userMessage" class="user-message" style="display:none;"></div>

  <div class="container select-container">
    <div class="card">
      <h1>👤 Quem é você?</h1>
      <p class="sub">Selecione o profissional que você quer representar</p>
      <p id="roleDebugBadge" style="text-align:center;margin:-12px 0 16px;"></p>
      <div id="profList" class="prof-grid"><div class="loading">Carregando...</div></div>
      <a href="./professional-dashboard.html" class="back-link">← Voltar para área profissional</a>
    </div>
  </div>

  <script src="./loader.js"></script>

  <script>
    document.addEventListener('scriptsLoaded', function () {
    // ============================================================
    // SELEÇÃO DE PROFISSIONAL — LISTA TODOS (MODO DEV)
    // ============================================================
    // ATENÇÃO: Atualmente, esta página lista TODOS os profissionais
    // do sistema para facilitar testes. Futuramente, quando o fluxo
    // de multi-perfil estiver completo, deve-se filtrar apenas os
    // profissionais vinculados ao usuário (via user_profiles).
    // Para filtrar, substitua a chamada fetchAPI abaixo pela busca
    // em user_profiles.
    // ============================================================

    const urlParams = new URLSearchParams(window.location.search);
    const force = urlParams.get('force') === 'true';
    console.log('🔍 Force mode:', force);

    const session = getSession();
    const roleBadge = typeof getProfileRoleBadge === 'function' ? getProfileRoleBadge(session) : '';
    const badgeEl = document.getElementById('roleDebugBadge');
    if (badgeEl && roleBadge) {
      badgeEl.innerHTML = `<span class="mock-badge" style="display:inline-block;background:#eef2ff;color:#4338ca;">${roleBadge}</span>`;
    }
    if (!session?.userId) {
      window.location.href = './login.html?intent=professional';
    }
    if (getActiveProfileType(session) !== 'professional') {
      setActiveProfileType('professional');
    }
    if (!force && session.professionalId) {
      window.location.href = './professional-dashboard.html';
    }

    const listEl = document.getElementById('profList');

    function selecionarProfissional(id, name) {
      const currentSession = getSession();
      const newSession = {
        ...currentSession,
        activeProfile: 'professional',
        role: 'profissional',
        professionalId: id,
        name: name
      };
      setSession(newSession);
      if (!force) {
        updateUser(session.userId, { professional_id: id });
      }
      window.location.href = './professional-dashboard.html';
    }

    async function carregarProfissionais() {
      listEl.innerHTML = '<div class="loading">Carregando...</div>';
      try {
        // 🔥 LISTA TODOS OS PROFISSIONAIS (MODO DEV)
        // Para filtrar apenas os vinculados, descomente o bloco abaixo e comente este.
        const data = await fetchAPI(
          `/rest/v1/professionals?select=id,name,specialty,avatar_url,current_establishment:establishments!professionals_current_establishment_id_fkey(id,name)&order=name`
        );

        // === BLOCO COMENTADO: FILTRO POR USER_PROFILES ===
        // const userProfiles = await fetchAPI(`/rest/v1/user_profiles?user_id=eq.${session.userId}&type=eq.professional&select=profile_id`);
        // const ids = userProfiles.map(up => up.profile_id);
        // if (!ids.length) {
        //   listEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Você não tem profissionais vinculados. <a href="./professional-onboarding.html">Cadastre um</a>.</p></div>`;
        //   return;
        // }
        // const idList = ids.join(',');
        // const data = await fetchAPI(`/rest/v1/professionals?id=in.(${idList})&select=id,name,specialty,avatar_url,current_establishment:establishments!professionals_current_establishment_id_fkey(id,name)&order=name`);

        if (!data || data.length === 0) {
          listEl.innerHTML = `<div class="empty-state"><div class="icon">📭</div><p>Nenhum profissional cadastrado.</p></div>`;
          return;
        }
        let html = '';
        data.forEach(p => {
          const avatar = p.avatar_url ? `<img src="${p.avatar_url}" class="avatar-small" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">` : '';
          const placeholder = p.avatar_url ? `<div class="avatar-small" style="display:none;">${p.name.charAt(0).toUpperCase()}</div>` : `<div class="avatar-small">${p.name.charAt(0).toUpperCase()}</div>`;
          const estab = p.current_establishment?.name ? `📍 ${escapeHtml(p.current_establishment.name)}` : '📍 Autônomo';
          html += `<div class="prof-card" onclick="selecionarProfissional('${p.id}', '${escapeHtml(p.name)}')">
            ${avatar || placeholder}
            <div class="info"><div class="name">${escapeHtml(p.name)}</div><div class="specialty">${escapeHtml(p.specialty || 'Profissional')}</div><div class="estab">${estab}</div></div>
            <span class="badge-select">ENTRAR</span>
          </div>`;
        });
        listEl.innerHTML = html;
      } catch (e) {
        listEl.innerHTML = `<p style="color:red;">Erro: ${e.message}</p>`;
        console.error('Erro ao carregar profissionais:', e);
      }
    }

    carregarProfissionais();
    });
  </script>

</body>
</html>
