<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="theme-color" content="#08080f" />
  <meta name="color-scheme" content="dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>🏆 Ranking Pro — Quem é você?</title>
  <link rel="stylesheet" href="./css/tokens.css" />
  <link rel="stylesheet" href="./css/proofly.css" />
  <style>
    .select-container { max-width: 720px; margin: 30px auto; padding: 0 20px; }
    .select-container .card { padding: 28px 24px; }
    .select-container h1 { text-align: center; font-size: 28px; color: #0f172a; margin-bottom: 4px; }
    .select-container .sub { text-align: center; color: #64748b; margin-bottom: 24px; font-size: 15px; }
    .user-grid { display: flex; flex-direction: column; gap: 10px; max-height: 520px; overflow-y: auto; padding-right: 6px; }
    .user-card {
      display: flex; align-items: center; gap: 16px; background: #f8fafc; border-radius: 14px;
      padding: 14px 18px; cursor: pointer; border: 2px solid transparent; transition: all 0.2s;
    }
    .user-card:hover { border-color: #6366f1; background: #eef2ff; transform: translateX(4px); }
    .user-card .avatar-small {
      width: 48px; height: 48px; border-radius: 50%; object-fit: cover; flex-shrink: 0;
      background: linear-gradient(135deg, #6366f1, #8b5cf6); display: flex; align-items: center;
      justify-content: center; font-weight: 700; font-size: 20px; color: #fff;
    }
    .user-card .info { flex: 1; min-width: 0; }
    .user-card .info .name { font-weight: 700; color: #0f172a; font-size: 17px; }
    .user-card .info .meta { color: #64748b; font-size: 13px; margin-top: 2px; }
    .user-card .info .roles { display: flex; gap: 6px; margin-top: 4px; flex-wrap: wrap; }
    .user-card .role-badge {
      font-size: 11px; padding: 2px 10px; border-radius: 20px; font-weight: 600;
    }
    .role-badge.cliente { background: #dbeafe; color: #1d4ed8; }
    .role-badge.profissional { background: #dcfce7; color: #15803d; }
    .role-badge.estabelecimento { background: #fef3c7; color: #92400e; }
    .user-card .badge-select { background: #6366f1; color: #fff; padding: 4px 14px; border-radius: 20px; font-size: 12px; font-weight: 600; opacity: 0; transition: 0.2s; flex-shrink: 0; }
    .user-card:hover .badge-select { opacity: 1; }
    .empty-state { text-align: center; color: #94a3b8; padding: 40px 20px; }
    .empty-state .icon { font-size: 48px; margin-bottom: 12px; }
    .back-link { display: block; text-align: center; margin-top: 16px; color: #6366f1; font-weight: 600; text-decoration: none; font-size: 14px; }
    @media (max-width: 480px) { .select-container .card { padding: 20px 16px; } }
  </style>
</head>
<body>
  <div class="container select-container">
    <div class="card">
      <h1>👤 Quem é você?</h1>
      <p class="sub">Selecione o usuário para simular o login</p>
      <div id="userList" class="user-grid"><div class="loading">Carregando...</div></div>
      <a href="./login.html" class="back-link">← Voltar ao login</a>
    </div>
  </div>

  <script src="./loader.js"></script>
  <script>
    document.addEventListener('scriptsLoaded', function () {
      const listEl = document.getElementById('userList');

      async function selecionarUsuario(user) {
        try {
          if (typeof prepareUserAfterAuth === 'function') {
            user = await prepareUserAfterAuth(user);
          }

          const sessionData = typeof buildSessionFromUser === 'function'
            ? buildSessionFromUser(user)
            : {
                userId: user.id,
                name: user.name,
                email: user.email,
                role: user.role,
                clientId: user.client_id || null,
                professionalId: user.professional_id || null,
                establishmentId: user.establishment_id || null,
                isAdmin: user.is_admin || false
              };

          delete sessionData.activeProfile;
          setSession(sessionData);

          window.location.href = './select-profile.html';
        } catch (e) {
          if (typeof showAlert === 'function') showAlert('❌ Erro', e.message);
          else alert('Erro: ' + e.message);
        }
      }

      window.selecionarUsuarioById = async function(id) {
        try {
          const user = await fetchUserById(id);
          if (user) await selecionarUsuario(user);
        } catch (e) {
          if (typeof showAlert === 'function') showAlert('❌ Erro', e.message);
        }
      };

      async function carregarUsuarios() {
        listEl.innerHTML = '<div class="loading">Carregando...</div>';
        try {
          const data = await fetchAPI('/rest/v1/users?select=id,name,email,role,professional_id,establishment_id,client_id&order=name&limit=100');

          if (!data?.length) {
            listEl.innerHTML = '<div class="empty-state"><div class="icon">📭</div><p>Nenhum usuário cadastrado.</p></div>';
            return;
          }

          // Fetch professional and establishment names for display
          const profIds = data.map(u => u.professional_id).filter(Boolean);
          const estIds = data.map(u => u.establishment_id).filter(Boolean);
          let profNames = {}, estNames = {};
          if (profIds.length) {
            try {
              const pData = await fetchAPI('/rest/v1/professionals?select=id,name&id=in.(' + profIds.map(e => e).join(',') + ')&limit=50');
              (pData || []).forEach(p => profNames[p.id] = p.name);
            } catch {}
          }
          if (estIds.length) {
            try {
              const eData = await fetchAPI('/rest/v1/establishments?select=id,name&id=in.(' + estIds.map(e => e).join(',') + ')&limit=50');
              (eData || []).forEach(e => estNames[e.id] = e.name);
            } catch {}
          }

          listEl.innerHTML = data.map(u => {
            const initial = (u.name || '?').charAt(0).toUpperCase();
            const roleLabels = [];
            if (u.client_id) roleLabels.push('<span class="role-badge cliente">👤 Cliente</span>');
            if (u.professional_id) roleLabels.push('<span class="role-badge profissional">💇 Profissional</span>');
            if (u.establishment_id) roleLabels.push('<span class="role-badge estabelecimento">🏪 Estabelecimento</span>');
            if (!roleLabels.length) roleLabels.push('<span class="role-badge" style="background:#f1f5f9;color:#475569;">👤 Usuário</span>');
            const safeName = (u.name || '').replace(/'/g, "\\'");
            const profName = u.professional_id ? profNames[u.professional_id] : null;
            const estName = u.establishment_id ? estNames[u.establishment_id] : null;
            const extraMeta = [profName, estName].filter(Boolean).join(' · ');
            return `<div class="user-card" onclick="selecionarUsuarioById('${u.id}')">
              <div class="avatar-small">${initial}</div>
              <div class="info">
                <div class="name">${escapeHtml(u.name)}</div>
                <div class="meta">${escapeHtml(u.email || '—')}${extraMeta ? ' · ' + escapeHtml(extraMeta) : ''}</div>
                <div class="roles">${roleLabels.join('')}</div>
              </div>
              <span class="badge-select">ENTRAR</span>
            </div>`;
          }).join('');
        } catch (e) {
          listEl.innerHTML = '<p style="color:#ef4444;text-align:center;">Erro ao carregar usuários: ' + escapeHtml(e.message) + '</p>';
          console.error(e);
        }
      }

      carregarUsuarios();
    });
  </script>
</body>
</html>
